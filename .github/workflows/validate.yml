name: Validate research repository

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: python -m pip install -r requirements.txt
      - name: Run torque simulation
        run: python simulation/torque_model.py
      - name: Run deterministic workflow mock
        run: python prototype/workflow_orchestrator_mock.py
      - name: Validate repository structure
        run: python scripts/validate_repo.py
